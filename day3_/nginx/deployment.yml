# https://kubernetes.io/docs/concepts/workloads/controllers/deployment/ 
# refer these for deploymetns 

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: ngnix

spec: 
  replicas: 2 
  selector: 
    matchLabels:
    app: nginx
  template:
    metadata:
      name: nginx-temp
      labels:
       app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80     
  
    